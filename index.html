<!DOCTYPE html>
<html>
<head>

<title>Galaxy Linktree</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
padding-top:60px;
overflow:hidden;
background:black;
}

/* GALAXY BACKGROUND */

.galaxy{
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
z-index:-3;

background:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");
background-size:cover;

animation:putarGalaxy 220s linear infinite;
opacity:0.6;
}

@keyframes putarGalaxy{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* PARTICLES */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
}

/* METEOR */

.meteor{
position:fixed;
width:2px;
height:100px;
background:linear-gradient(-45deg,white,transparent);
opacity:0.8;
animation:meteor 6s linear infinite;
}

.meteor:nth-child(1){
top:10%;
left:80%;
animation-delay:0s;
}

.meteor:nth-child(2){
top:20%;
left:60%;
animation-delay:2s;
}

.meteor:nth-child(3){
top:0%;
left:40%;
animation-delay:4s;
}

@keyframes meteor{

0%{
transform:translate(0,0) rotate(45deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translate(-900px,900px) rotate(45deg);
opacity:0;
}

}

/* PROFILE */

.profile img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
box-shadow:0 0 30px gold;
}

h1{
color:gold;
margin-top:15px;
font-size:36px;
letter-spacing:2px;
text-shadow:0 0 10px gold;
}

p{
color:#ccc;
}

/* LINKS */

.links{
margin-top:35px;
}

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;

width:300px;
margin:15px auto;
padding:16px;

background:rgba(0,0,0,0.55);
border-radius:14px;

text-decoration:none;
color:white;
font-size:18px;

transition:0.3s;
border:1px solid rgba(255,215,0,0.5);
backdrop-filter:blur(8px);
}

.link img{
width:24px;
height:24px;
}

.link:hover{
background:gold;
color:black;
transform:scale(1.07);
box-shadow:0 0 25px gold;
}

</style>

</head>

<body>

<div class="galaxy"></div>
<div id="particles-js"></div>

<div class="meteor"></div>
<div class="meteor"></div>
<div class="meteor"></div>

<div class="profile">

<img src="https://i.imgur.com/YmKFtMm.png">

<h1>SANDI PRAYOGI</h1>
<p>Welcome Para Sahabat</p>

</div>

<div class="links">

<a class="link" href="https://www.instagram.com/sanyourbae14">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
Instagram
</a>

<a class="link" href="https://www.tiktok.com/@sandipra04">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
TikTok
</a>

<a class="link" href="https://wa.me/6285722196401">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
WhatsApp
</a>

<a class="link" href="https://twitter.com/sandipra66">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968830.png">
Twitter / X
</a>

</div>

<script>

particlesJS("particles-js", {
  "particles": {
    "number": {
      "value": 120
    },
    "color": {
      "value": "#ffffff"
    },
    "shape": {
      "type": "circle"
    },
    "opacity": {
      "value": 0.7
    },
    "size": {
      "value": 2,
      "random": true
    },
    "move": {
      "enable": true,
      "speed": 1
    }
  }
});

</script>

</body>
</html>
